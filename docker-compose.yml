version: '3.8'

services:

  # ── MySQL Database ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: git_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Root@1234
      MYSQL_DATABASE: git_recruitment
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────────
  backend:
    build: ./backend
    container_name: git_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/git_recruitment?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Root@1234
      SPRING_MAIL_USERNAME: placements@git.edu
      SPRING_MAIL_PASSWORD: your_app_password
      APP_FRONTEND_URL: http://localhost
      APP_FILE_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  # ── React Frontend ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: git_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # ── Node Exporter (System Metrics) ─────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: git_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: git_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: git_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  uploads_data:
  prometheus_data:
  grafana_data:
